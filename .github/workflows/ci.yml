name: Berber Sepeti CI/CD

on:
  push:
    branches: [main, claude/barber-booking-service-dwlfd]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build API (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore & Build
        run: dotnet build BerberApi/BerberApi.csproj -c Release

      - name: Publish
        run: dotnet publish BerberApi/BerberApi.csproj -c Release -o publish/api

      - uses: actions/upload-artifact@v4
        with:
          name: api
          path: publish/api

  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: BerberFrontend
        run: npm install

      - name: Build
        working-directory: BerberFrontend
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: BerberFrontend/dist
