name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ── 1. Başlangıç bildirimi ───────────────────────────────────────────
  notify-start:
    name: Notify – CI Başladı
    runs-on: ubuntu-latest
    steps:
      - name: Telegram
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🚀 <b>CI Başladı – Medtravio</b>%0ACommit: <code>$SHORT</code> | ${{ github.actor }}"

  # ── 2. Backend build ─────────────────────────────────────────────────
  build-backend:
    name: Build Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Build
        working-directory: test_project_api/test_project_api
        run: dotnet build --configuration Release

  # ── 3. Frontend build ────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install
        working-directory: Frontend
        run: npm ci
      - name: Lint
        working-directory: Frontend
        run: npm run lint || true
      - name: Build
        working-directory: Frontend
        run: npm run build
      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 1

  # ── 4. Build sonucu Telegram ─────────────────────────────────────────
  notify-build:
    name: Notify – Build Sonucu
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Telegram
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          REPO="${{ github.repository }}"
          RUN="${{ github.run_id }}"
          BE="${{ needs.build-backend.result }}"
          FE="${{ needs.build-frontend.result }}"
          [ "$BE" = "success" ] && BE_ICON="✅" || BE_ICON="❌"
          [ "$FE" = "success" ] && FE_ICON="✅" || FE_ICON="❌"
          if [ "$BE" = "success" ] && [ "$FE" = "success" ]; then
            TEXT="✅ <b>Build Başarılı – Medtravio</b>%0ACommit: <code>$SHORT</code> | ${{ github.actor }}%0A%0ABackend + Frontend derlendi, deploy başlıyor...%0A<a href='https://github.com/$REPO/actions/runs/$RUN'>Detaylar</a>"
          else
            TEXT="❌ <b>Build Hatası – Medtravio</b>%0ACommit: <code>$SHORT</code> | ${{ github.actor }}%0A%0A${BE_ICON} Backend: $BE%0A${FE_ICON} Frontend: $FE%0A%0A<a href='https://github.com/$REPO/actions/runs/$RUN'>Hata logları için tıkla</a>"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="$TEXT"

  # ── 5. Deploy (self-hosted Windows) ──────────────────────────────────
  deploy:
    name: Deploy to IIS
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, Windows]
    if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Create deploy dir
        shell: cmd
        run: if not exist C:\deploy mkdir C:\deploy

      - name: Publish backend
        shell: cmd
        run: dotnet publish test_project_api\test_project_api\test_project_api.csproj --configuration Release --output C:\deploy\api-new

      - name: Swap backend in IIS
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\TestProcess-api"
          if (Test-Path "$target-prev") { Remove-Item "$target-prev" -Recurse -Force }
          if (Test-Path $target)        { Rename-Item $target "$target-prev" -Force }
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item "C:\deploy\api-new\*" $target -Recurse -Force
          Remove-Item "C:\deploy\api-new" -Recurse -Force

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: C:\deploy\frontend-dist

      - name: Deploy frontend to IIS
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\TestProcess-Frontend"
          if (Test-Path $target) { Remove-Item "$target\*" -Recurse -Force }
          else { New-Item -ItemType Directory -Path $target -Force | Out-Null }
          Copy-Item "C:\deploy\frontend-dist\*" $target -Recurse -Force
          Remove-Item "C:\deploy\frontend-dist" -Recurse -Force

      - name: Telegram – deploy başarılı
        if: success()
        shell: cmd
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "parse_mode=HTML" -d "disable_web_page_preview=true" -d "text=%E2%9C%85 Deploy Tamamlandi - Medtravio%0ACommit: ${{ github.sha }} | ${{ github.actor }}%0ABackend ve Frontend IIS'e alindi.%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Telegram – deploy hatası
        if: failure()
        shell: cmd
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "parse_mode=HTML" -d "disable_web_page_preview=true" -d "text=%E2%9D%8C Deploy Hatasi - Medtravio%0ACommit: ${{ github.sha }} | ${{ github.actor }}%0AHata detaylari icin:%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
