name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  notify-start:
    name: Notify CI Started
    runs-on: ubuntu-latest
    steps:
      - name: Send start notification
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=🚀 <b>CI/CD Başladı – TestProcess</b>%0A%0ACommit: <code>$COMMIT_SHORT</code>%0ABranch: main%0ATetikleyen: ${{ github.actor }}"

  build-backend:
    name: Build Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore & Build
        working-directory: test_project_api/test_project_api
        run: dotnet build --configuration Release 2>&1 | tee /tmp/backend-build.log

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-error-log
          path: /tmp/backend-build.log
          retention-days: 1

  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Lint
        working-directory: Frontend
        run: npm run lint 2>&1 | tee /tmp/frontend-lint.log

      - name: Build
        working-directory: Frontend
        run: npm run build 2>&1 | tee /tmp/frontend-build.log

      - name: Merge error logs
        if: failure()
        run: cat /tmp/frontend-lint.log /tmp/frontend-build.log > /tmp/frontend-error.log 2>/dev/null || true

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-error-log
          path: /tmp/frontend-error.log
          retention-days: 1

      - name: Upload frontend build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to Windows Server (IIS)
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, Windows]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Publish backend to IIS directory
        shell: powershell
        run: |
          dotnet publish test_project_api/test_project_api/test_project_api.csproj `
            --configuration Release `
            --output C:\deploy\testprocess-api-new `
            2>&1 | Tee-Object -FilePath C:\deploy\deploy-error.log

      - name: Swap backend in IIS
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\TestProcess-api"
          if (Test-Path "$target-previous") { Remove-Item "$target-previous" -Recurse -Force }
          if (Test-Path $target) { Copy-Item $target "$target-previous" -Recurse }
          if (Test-Path $target) { Remove-Item "$target\*" -Recurse -Force }
          else { New-Item -ItemType Directory -Path $target -Force | Out-Null }
          Copy-Item "C:\deploy\testprocess-api-new\*" "$target\" -Recurse -Force
          Remove-Item "C:\deploy\testprocess-api-new" -Recurse -Force
          Write-Host "Backend deploy tamamlandı: $target"

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: C:\deploy\testprocess-frontend-dist

      - name: Deploy frontend to IIS
        shell: powershell
        run: |
          $target = "C:\inetpub\wwwroot\TestProcess-Frontend"
          if (Test-Path $target) { Remove-Item "$target\*" -Recurse -Force }
          else { New-Item -ItemType Directory -Path $target -Force | Out-Null }
          Copy-Item "C:\deploy\testprocess-frontend-dist\*" "$target\" -Recurse -Force
          Remove-Item "C:\deploy\testprocess-frontend-dist" -Recurse -Force
          Write-Host "Frontend deploy tamamlandı: $target"

      - name: Upload deploy error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-error-log
          path: C:\deploy\deploy-error.log
          retention-days: 1

  notify:
    name: Send Telegram Notification
    needs: [build-backend, build-frontend, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Backend (.NET 10)" >> "$GITHUB_OUTPUT"
            echo "artifact=backend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-frontend.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Frontend (React/Vite)" >> "$GITHUB_OUTPUT"
            echo "artifact=frontend-error-log" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "component=Deploy (IIS)" >> "$GITHUB_OUTPUT"
            echo "artifact=deploy-error-log" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "component=Tüm adımlar" >> "$GITHUB_OUTPUT"
            echo "artifact=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download error log
        if: steps.status.outputs.result == 'failure' && steps.status.outputs.artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.status.outputs.artifact }}
          path: /tmp/error-logs/
        continue-on-error: true

      - name: Send Telegram notification
        run: |
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          COMPONENT="${{ steps.status.outputs.component }}"
          RESULT="${{ steps.status.outputs.result }}"

          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ <b>CI BAŞARILI – TestProcess</b>%0A%0ACommit: <code>$COMMIT_SHORT</code> | Branch: main | Tetikleyen: $ACTOR%0A%0ABackend + Frontend IIS'e deploy edildi.%0A%0A<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">Detaylar</a>"
          else
            ERROR_LOG="Hata logu indirilemedi."
            for f in /tmp/error-logs/*; do
              if [ -f "$f" ]; then
                ERROR_LOG=$(tail -30 "$f")
                break
              fi
            done
            MESSAGE="❌ <b>CI HATASI – TestProcess</b>%0A%0ABileşen: $COMPONENT%0ACommit: <code>$COMMIT_SHORT</code> | Branch: main | Tetikleyen: $ACTOR%0A%0A<pre>$(echo "$ERROR_LOG" | head -c 2000)</pre>%0A%0A<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">Tam loglar</a>"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
